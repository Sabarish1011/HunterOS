services:
  postgres:
    image: postgres:16-alpine
    container_name: hunteros-postgres
    restart: unless-stopped
    networks:
      - hunteros_data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hunteros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hunteros}
      POSTGRES_DB: ${POSTGRES_DB:-hunteros}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hunteros} -d ${POSTGRES_DB:-hunteros}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hunteros-redis
    restart: unless-stopped
    networks:
      - hunteros_data
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: hunteros-qdrant
    restart: unless-stopped
    networks:
      - hunteros_data
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q qdrant'"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hunteros-backend
    restart: unless-stopped
    networks:
      - hunteros_app
      - hunteros_data
    env_file:
      - ../backend/.env.example
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hunteros-frontend
    restart: unless-stopped
    networks:
      - hunteros_app
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  hunteros_app:
    driver: bridge
  hunteros_data:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
